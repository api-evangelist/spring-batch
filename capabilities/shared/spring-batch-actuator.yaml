naftiko: "1.0.0-alpha1"

info:
  label: "Spring Batch Actuator API"
  description: >-
    Spring Boot Actuator endpoints for monitoring and managing Spring Batch
    applications. Provides health checks, Micrometer metrics, and batch job
    execution visibility.
  tags:
    - Batch Processing
    - Spring Batch
    - Monitoring
    - Actuator
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPRING_BATCH_ACTUATOR_BASE_URL: SPRING_BATCH_ACTUATOR_BASE_URL

capability:
  consumes:
    - type: http
      namespace: spring-batch-actuator
      baseUri: "{{env.SPRING_BATCH_ACTUATOR_BASE_URL}}/actuator"
      description: "Spring Boot Actuator endpoints for Spring Batch 5.1 monitoring"
      resources:
        - name: health
          path: /health
          description: "Application and batch subsystem health checks"
          operations:
            - name: get-health
              method: GET
              description: "Get overall application health status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-batch-health
              method: GET
              description: "Get Spring Batch specific health status"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: metrics
          path: /metrics
          description: "Micrometer metrics including Spring Batch job and step metrics"
          operations:
            - name: list-metrics
              method: GET
              description: "List all available metric names"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-metric
              method: GET
              description: "Get measurements for a specific metric by name"
              inputParameters:
                - name: metricName
                  in: path
                  type: string
                  required: true
                  description: "Metric name (e.g., spring.batch.job.duration)"
                - name: tag
                  in: query
                  type: string
                  required: false
                  description: "Tag filter in name:value format"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: batch-jobs
          path: /batch/jobs
          description: "Batch job management and execution history"
          operations:
            - name: list-batch-jobs
              method: GET
              description: "List all registered Spring Batch jobs"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-batch-job
              method: GET
              description: "Get details for a specific batch job"
              inputParameters:
                - name: jobName
                  in: path
                  type: string
                  required: true
                  description: "Name of the batch job"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: list-job-executions
              method: GET
              description: "List execution history for a specific batch job"
              inputParameters:
                - name: jobName
                  in: path
                  type: string
                  required: true
                  description: "Name of the batch job"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number (zero-based)"
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: "Number of executions per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: list-job-instances
              method: GET
              description: "List job instances for a specific batch job"
              inputParameters:
                - name: jobName
                  in: path
                  type: string
                  required: true
                  description: "Name of the batch job"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number (zero-based)"
                - name: size
                  in: query
                  type: integer
                  required: false
                  description: "Page size"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: spring-batch-actuator-rest
      resources:
        - path: /v1/health
          name: health
          description: "Application health endpoints"
          operations:
            - method: GET
              name: get-health
              description: "Get application health status"
              call: "spring-batch-actuator.get-health"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/metrics
          name: metrics
          description: "Batch metrics endpoints"
          operations:
            - method: GET
              name: list-metrics
              description: "List all available metrics"
              call: "spring-batch-actuator.list-metrics"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/metrics/{metricName}
          name: metric-detail
          description: "Single metric detail"
          operations:
            - method: GET
              name: get-metric
              description: "Get measurements for a specific metric"
              call: "spring-batch-actuator.get-metric"
              with:
                metricName: "rest.metricName"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/jobs
          name: batch-jobs
          description: "Batch job management"
          operations:
            - method: GET
              name: list-batch-jobs
              description: "List all registered batch jobs"
              call: "spring-batch-actuator.list-batch-jobs"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/jobs/{jobName}/executions
          name: job-executions
          description: "Job execution history"
          operations:
            - method: GET
              name: list-job-executions
              description: "List execution history for a batch job"
              call: "spring-batch-actuator.list-job-executions"
              with:
                jobName: "rest.jobName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spring-batch-actuator-mcp
      transport: http
      tools:
        - name: get-batch-health
          description: "Check the health status of the Spring Batch application"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-batch-actuator.get-health"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-batch-metrics
          description: "List all available Spring Batch Micrometer metrics"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-batch-actuator.list-metrics"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-batch-metric
          description: "Get measurements for a specific Spring Batch metric"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-batch-actuator.get-metric"
          with:
            metricName: "tools.metricName"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-batch-jobs
          description: "List all registered Spring Batch jobs in the application"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-batch-actuator.list-batch-jobs"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-batch-job
          description: "Get details for a specific Spring Batch job by name"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-batch-actuator.get-batch-job"
          with:
            jobName: "tools.jobName"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-job-executions
          description: "List execution history for a specific Spring Batch job"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-batch-actuator.list-job-executions"
          with:
            jobName: "tools.jobName"
            page: "tools.page"
            size: "tools.size"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-job-instances
          description: "List job instances for a specific Spring Batch job"
          hints:
            readOnly: true
            openWorld: true
          call: "spring-batch-actuator.list-job-instances"
          with:
            jobName: "tools.jobName"
          outputParameters:
            - type: object
              mapping: "$."
